name: Update NBA 3PT Luck Report

on:
  schedule:
    # Run at 10:07 UTC year-round (5:07 AM EST / 6:07 AM EDT), only during NBA season months (Oct-Jun).
    # GitHub schedules are UTC and can be delayed at the top of the hour, so avoid :00.
    - cron: '7 10 * 10-12,1-6 *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Get rolling update window
        id: date
        run: |
          echo "three_days_ago=$(date -u -d '3 days ago' +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "yesterday=$(date -u -d '1 day ago' +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "today=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Run daily update
        run: |
          python run_daily.py --start ${{ steps.date.outputs.three_days_ago }} --end ${{ steps.date.outputs.yesterday }}

      - name: Generate report
        run: |
          python generate_report.py
          python fetch_bbref_advanced.py
          python build_65_daily.py
          python run_onoff.py --start ${{ steps.date.outputs.three_days_ago }} --end ${{ steps.date.outputs.yesterday }} --recompute-existing
          python generate_onoff_report.py
          python generate_rapm_report.py --use-possessions
          python generate_onoff_daily_boxscore_report.py

      - name: Copy report to index.html
        run: |
          cp data/3pt_luck_report.html index.html

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update: Games through ${{ steps.date.outputs.yesterday }}"
          git push
