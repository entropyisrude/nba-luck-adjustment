name: Weekly PBP Data Refresh

on:
  schedule:
    # Run at 12:00 UTC every Sunday
    - cron: '0 12 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh-pbp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Get weekly update window
        id: date
        run: |
          if [ "$(date -u +'%m')" -ge 10 ]; then
            echo "season_start=$(date -u +'%Y')-10-01" >> $GITHUB_OUTPUT
          else
            echo "season_start=$(($(date -u +'%Y') - 1))-10-01" >> $GITHUB_OUTPUT
          fi
          echo "fourteen_days_ago=$(date -u -d '14 days ago' +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "yesterday=$(date -u -d '1 day ago' +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "today=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Pull LFS data
        run: |
          git lfs pull

      - name: Refresh PBP and Stints
        run: |
          # Rebuild the current-season files from season start so search pages see the full season,
          # not just the recent rolling window.
          python run_onoff.py --start ${{ steps.date.outputs.season_start }} --end ${{ steps.date.outputs.yesterday }} --history-season-start ${{ steps.date.outputs.season_start }} --history-season-end ${{ steps.date.outputs.yesterday }}
          python generate_possessions_from_pbp.py
          python scripts/build_player_boxscore_stats_csv.py
          python scripts/build_analytics_duckdb.py
          python generate_player_game_search_report.py
          python generate_player_span_search_report.py
          python generate_rapm_report.py --use-possessions

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Weekly PBP Refresh: Games through ${{ steps.date.outputs.yesterday }}"
          git push
